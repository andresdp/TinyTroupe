; ATAM Simulation configuration
; This file is read by atamsim.config.ATAMConfig and provides defaults
; specific to ATAM evaluations. It does NOT override TinyTroupe's own
; config.ini (LLM model, API keys, etc.) which remains in the project root.

[ATAM]
; Default number of simulation steps to run per ATAM phase when no
; explicit n_steps is given to a phase's execute() method.
DEFAULT_STEPS_PER_PHASE = 5

; Maximum number of scenarios to extract from a single stakeholder during
; the scenario generation phase.
SCENARIO_MAX_PER_STAKEHOLDER = 5

; The maximum value a stakeholder can assign when voting for a scenario's
; priority during the scenario prioritization phase.
PRIORITIZATION_VOTE_RANGE = 10

; Whether to attach FilesAndWebGroundingFaculty to stakeholders so they can
; consult architecture documents during the simulation.
ENABLE_GROUNDING_DOCUMENTS = true

; Whether to run LLM-based consolidation/deduplication of scenarios after
; individual stakeholders have proposed them.
CONSOLIDATION_ENABLED = true